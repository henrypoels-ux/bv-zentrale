<script>
let _stTimer = null;
function setStatus(msg) {
  const el = document.getElementById("sync-status");
  if (el) el.textContent = msg;
}
window.storage = {
  get(key) {
    try { const v = localStorage.getItem(key); return Promise.resolve(v !== null ? {key,value:v} : null); }
    catch { return Promise.resolve(null); }
  },
  set(key, value) {
    try {
      const s = typeof value === 'string' ? value : JSON.stringify(value);
      localStorage.setItem(key, s);
      clearTimeout(_stTimer); setStatus("Gespeichert ✓");
      _stTimer = setTimeout(()=>setStatus(""), 1500);
      return Promise.resolve({key,value:s});
    } catch(e) { setStatus("Fehler!"); return Promise.reject(e); }
  },
  delete(key) { try{localStorage.removeItem(key);}catch{} return Promise.resolve({key,deleted:true}); }
};
</script>

function buildVergabe(bvList, saved) {
  const r = saved ? {...saved} : {};
  bvList.forEach(bv => {
    if (!r[bv.num]) {
      const raw = EXCEL_VG[bv.num] || [];
      const e = {};
      GEWERKE.forEach((g,i) => { e[g] = {status: normV(raw[i]||''), hw:''}; });
      r[bv.num] = e;
    }
  });
  return r;
}

function buildCheckliste(bvList, saved) {
  // Merge EXCEL_CL defaults with saved data; migrate old {done,date,note} → {st,date,note}
  const r = {};
  bvList.forEach(bv => {
    const excel = EXCEL_CL[bv.num] || {};
    const savd  = saved ? (saved[bv.num] || {}) : {};
    const merged = {};
    // First apply excel defaults
    Object.entries(excel).forEach(([id,v]) => {
      merged[id] = {st: v.st||'', date: v.d||'', note: ''};
    });
    // Then overlay saved (supports both old format {done} and new {st})
    Object.entries(savd).forEach(([id,v]) => {
      const st = v.st !== undefined ? v.st : (v.done ? 'x' : '');
      merged[id] = {st, date: v.date||'', note: v.note||''};
    });
    r[bv.num] = merged;
  });
  return r;
}

/* ─── KW Utilities ─── */
function getKWNow() {
  const d = new Date();
  const utc = new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate()));
  const dow = utc.getUTCDay()||7;
  utc.setUTCDate(utc.getUTCDate()+4-dow);
  const ys = new Date(Date.UTC(utc.getUTCFullYear(),0,1));
  return {kw:Math.ceil(((utc-ys)/86400000+1)/7), year:utc.getUTCFullYear()};
}
function getMonday(kw,year) {
  const jan4 = new Date(year,0,4);
  const dow = jan4.getDay()||7;
  const mon = new Date(jan4.getTime()-(dow-1)*86400000);
  mon.setDate(mon.getDate()+(kw-1)*7);
  return mon;
}
function fmtDD(d) { return d.toLocaleDateString('de-DE',{day:'2-digit',month:'2-digit'}); }

.hk-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px}
.hk-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px}
.hk-card-header{display:flex;align-items:flex-start;gap:8px;margin-bottom:10px}
.hk-firma{font-size:14px;font-weight:600;flex:1}
.hk-gewerk-badge{font-size:10px;padding:2px 8px;border-radius:4px;background:rgba(88,166,255,.12);color:var(--accent);font-weight:600;white-space:nowrap}
.hk-field{display:flex;gap:6px;align-items:center;margin-bottom:5px;font-size:12px;color:var(--muted)}
.hk-field span{font-size:11px;min-width:40px;color:var(--muted)}
.hk-inp{flex:1;background:transparent;border:none;border-bottom:1px solid var(--border);color:var(--text);font-family:var(--font);font-size:12px;padding:2px 4px;outline:none}
.hk-inp:focus{border-bottom-color:var(--accent)}
.hk-sel{background:var(--bg);border:1px solid var(--border2);border-radius:4px;color:var(--text);font-family:var(--font);font-size:12px;padding:3px 6px;outline:none}
.hk-sel:focus{border-color:var(--accent)}
/* Shared */
.btn-sm{background:none;border:1px solid var(--border2);color:var(--muted);font-family:var(--font);font-size:11px;padding:4px 10px;border-radius:var(--radius);cursor:pointer;transition:all .12s}
.btn-sm:hover{color:var(--text);border-color:rgba(255,255,255,.3)}
.btn-sm.danger:hover{color:#f87171;border-color:#f87171}
@media print {
  @page{margin:15mm;size:A4}
  body{background:#fff!important;color:#111!important;font-family:Arial,sans-serif!important;font-size:11px!important}
  .nav,.filters,.btn-icon,.print-btn,.btn-ghost,.btn-primary,.btn-cancel,.add-task-row,.add-bv-row,.drag-handle,.tm-expand{display:none!important}

  .task-title.done{color:#999!important}

}

function SrcTag({src}) {
  if (src==="capmo") return <span className="src-tag src-capmo">Capmo</span>;
  if (src==="excel") return <span className="src-tag src-excel">Excel</span>;
  return <span className="src-tag src-both">Capmo + Excel</span>;
}

function UebersichtBVView({bvList, setBvList, saveBvList}) {
  const STATUS_ORDER = ['vorplanung','rohbau','ausbau','abgeschlossen'];
  const STATUS_META_BV = {
    vorplanung:    {label:'Vorplanung',    color:'#818cf8'},
    rohbau:        {label:'Rohbau',        color:'#f59e0b'},
    ausbau:        {label:'Ausbau',        color:'#38bdf8'},
    abgeschlossen: {label:'Abgeschlossen', color:'#4ade80'},
  };
  const STATUS_NEXT = {vorplanung:'rohbau', rohbau:'ausbau', ausbau:'abgeschlossen', abgeschlossen:'vorplanung'};
  const [collapsed, setCollapsed] = useState({abgeschlossen:true});
  const [editing, setEditing]     = useState(null);
  const [editBuf, setEditBuf]     = useState({});
  const [adding, setAdding]       = useState(null);
  const [newBuf, setNewBuf]       = useState({num:'',label:'',addr:''});

  const update = (num, patch) => {
    const next = bvList.map(b => b.num===num ? {...b,...patch} : b);
    setBvList(next); saveBvList(next);
  };
  const deleteBV = (num) => {
    if (!window.confirm('BV wirklich löschen?')) return;
    const next = bvList.filter(b => b.num!==num);
    setBvList(next); saveBvList(next);
  };
  const addBV = (status) => {
    if (!newBuf.label.trim()) return;
    const bv = {num: newBuf.num.trim()||('new_'+Date.now()), label: newBuf.label.trim(), addr: newBuf.addr.trim(), status};
    const next = [...bvList, bv];
    setBvList(next); saveBvList(next);
    setNewBuf({num:'',label:'',addr:''});
    setAdding(null);
  };
  const commitEdit = (num) => { update(num, editBuf); setEditing(null); };

  const counts = {};
  STATUS_ORDER.forEach(s => { counts[s] = bvList.filter(b=>b.status===s).length; });

  const inpStyle = {flex:'1 1 120px',background:'var(--bg)',border:'1px solid var(--border2)',borderRadius:'var(--radius)',color:'var(--text)',fontFamily:'var(--font)',fontSize:12,padding:'5px 8px',outline:'none'};

  return (
    <div className="page">
      <div className="summary">
        {STATUS_ORDER.map(s => (
          <div key={s} className="sum-card">
            <div className="sum-val" style={{color:STATUS_META_BV[s].color}}>{counts[s]}</div>
            <div className="sum-label">{STATUS_META_BV[s].label}</div>
          </div>
        ))}
        <div className="sum-card">
          <div className="sum-val">{bvList.length}</div>
          <div className="sum-label">BV gesamt</div>
        </div>
      </div>

      {STATUS_ORDER.map(status => {
        const meta = STATUS_META_BV[status];
        const list = bvList.filter(b=>b.status===status);
        const isCollapsed = !!collapsed[status];
        return (
          <div key={status} style={{marginBottom:12}}>
            <div onClick={()=>setCollapsed(c=>({...c,[status]:!c[status]}))}
              style={{display:'flex',alignItems:'center',gap:8,cursor:'pointer',padding:'8px 12px',
                borderRadius:'var(--radius-lg)',background:'var(--surface)',border:'1px solid var(--border)',
                marginBottom:isCollapsed?0:8,userSelect:'none'}}>
              <span style={{fontSize:16,color:meta.color,display:'inline-block',transform:isCollapsed?'rotate(-90deg)':'rotate(0deg)',transition:'transform .2s'}}>▾</span>
              <span style={{fontSize:13,fontWeight:600,color:meta.color,flex:1}}>{meta.label}</span>
              <span style={{fontSize:11,color:'var(--muted)',fontFamily:'var(--mono)'}}>{list.length} BV</span>
            </div>

            {!isCollapsed && (
              <div>
                {list.map(bv => editing===bv.num ? (
                  <div key={bv.num} style={{background:'var(--surface)',border:'1px solid var(--accent)',borderRadius:'var(--radius-lg)',padding:'12px 14px',marginBottom:6,display:'flex',flexWrap:'wrap',gap:8,alignItems:'flex-end'}}>
                    <input placeholder="Name" value={editBuf.label||''} onChange={e=>setEditBuf(b=>({...b,label:e.target.value}))} style={{...inpStyle,flex:'1 1 120px'}}/>
                    <input placeholder="Projektnr." value={editBuf.num||''} onChange={e=>setEditBuf(b=>({...b,num:e.target.value}))} style={{...inpStyle,flex:'0 1 90px'}}/>
                    <input placeholder="Adresse" value={editBuf.addr||''} onChange={e=>setEditBuf(b=>({...b,addr:e.target.value}))} style={{...inpStyle,flex:'2 1 180px'}}/>
                    <button className="btn-primary" onClick={()=>commitEdit(bv.num)}>✓ OK</button>
                    <button className="btn-cancel" onClick={()=>setEditing(null)}>Abbrechen</button>
                  </div>
                ) : (
                  <div key={bv.num} style={{display:'flex',alignItems:'center',gap:8,padding:'8px 12px',background:'var(--surface)',border:'1px solid var(--border)',borderRadius:'var(--radius-lg)',marginBottom:5}}>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontSize:13,fontWeight:600,color:'var(--text)',lineHeight:1.3}}>{bv.label}</div>
                      <div style={{fontSize:11,color:'var(--muted)',fontFamily:'var(--mono)',marginTop:1}}>{bv.num}</div>
                      {bv.addr && <div style={{fontSize:11,color:'rgba(125,133,144,.8)',marginTop:1}}>{bv.addr}</div>}
                    </div>
                    <button title={'→ '+STATUS_META_BV[STATUS_NEXT[status]].label}
                      onClick={()=>update(bv.num,{status:STATUS_NEXT[status]})}
                      style={{background:'none',border:'1px solid '+meta.color+'55',color:meta.color,fontSize:11,fontWeight:600,padding:'4px 8px',borderRadius:'var(--radius)',cursor:'pointer',whiteSpace:'nowrap'}}>
                      → {STATUS_META_BV[STATUS_NEXT[status]].label.split(' ')[0]}
                    </button>
                    <button onClick={()=>{setEditBuf({...bv});setEditing(bv.num)}}
                      style={{background:'none',border:'1px solid var(--border2)',color:'var(--muted)',fontSize:13,padding:'4px 7px',borderRadius:'var(--radius)',cursor:'pointer'}}>✎</button>
                    <button onClick={()=>deleteBV(bv.num)}
                      style={{background:'none',border:'1px solid rgba(248,113,113,.3)',color:'#f87171',fontSize:13,padding:'4px 7px',borderRadius:'var(--radius)',cursor:'pointer'}}>×</button>
                  </div>
                ))}

                {list.length===0 && (
                  <div style={{padding:'12px 14px',fontSize:12,color:'var(--muted)',background:'var(--surface)',border:'1px solid var(--border)',borderRadius:'var(--radius-lg)',marginBottom:6}}>
                    Keine BV in dieser Kategorie.
                  </div>
                )}

                {adding===status ? (
                  <div style={{background:'var(--surface)',border:'1px dashed var(--accent)',borderRadius:'var(--radius-lg)',padding:'12px 14px',marginTop:4,display:'flex',flexWrap:'wrap',gap:8,alignItems:'flex-end'}}>
                    <input placeholder="Name *" value={newBuf.label} autoFocus onChange={e=>setNewBuf(b=>({...b,label:e.target.value}))}
                      onKeyDown={e=>{if(e.key==='Enter')addBV(status);if(e.key==='Escape')setAdding(null)}}
                      style={{...inpStyle,flex:'1 1 120px'}}/>
                    <input placeholder="Projektnr." value={newBuf.num} onChange={e=>setNewBuf(b=>({...b,num:e.target.value}))} style={{...inpStyle,flex:'0 1 90px'}}/>
                    <input placeholder="Adresse" value={newBuf.addr} onChange={e=>setNewBuf(b=>({...b,addr:e.target.value}))} style={{...inpStyle,flex:'2 1 180px'}}/>
                    <button className="btn-primary" onClick={()=>addBV(status)}>Hinzufügen</button>
                    <button className="btn-cancel" onClick={()=>setAdding(null)}>Abbrechen</button>
                  </div>
                ) : (
                  <button onClick={()=>setAdding(status)}
                    style={{marginTop:4,background:'none',border:'1px solid '+meta.color+'44',color:meta.color,fontFamily:'var(--font)',fontSize:12,fontWeight:600,padding:'5px 14px',borderRadius:'var(--radius)',cursor:'pointer'}}>
                    + BV hinzufügen
                  </button>
                )}
              </div>
            )}
          </div>
        );
      })}
    </div>
  );
}


/* ══════════════════════════════════════════════════════════════
   TASK MANAGER
══════════════════════════════════════════════════════════════ */
function TaskRow({task,onPatch,onDelete,onCycleSt,onCycleAss,onAddSub,onPatchSub,onDelSub}) {
  const sm=STATUS_META[task.status]||STATUS_META.offen;
  const [newSub,setNewSub]=useState("");
  const [editing,setEditing]=useState(false);
  const [editVal,setEditVal]=useState(task.title);
  const commitEdit=()=>{if(editVal.trim())onPatch({title:editVal.trim()});else setEditVal(task.title);setEditing(false)};
  return (
    <div className="tm-task">
      <div className="tm-task-row">
        <button className="status-pill" style={{color:sm.color,background:sm.bg,borderColor:sm.border}} onClick={()=>onCycleSt(task.status)}>{sm.label}</button>
        {editing?(
          <input className="add-task-inp" style={{flex:1,fontSize:13,padding:"3px 8px"}} value={editVal}
            onChange={e=>setEditVal(e.target.value)}
            onKeyDown={e=>{if(e.key==="Enter")commitEdit();if(e.key==="Escape"){setEditVal(task.title);setEditing(false)}}}
            onBlur={commitEdit} autoFocus/>
        ):(
          <span className={`task-title${task.status==="erledigt"?" done":""}`} onClick={()=>onPatch({expanded:!task.expanded})}>{task.title}</span>
        )}
        <button className="btn-icon" onClick={()=>{setEditVal(task.title);setEditing(e=>!e)}} style={{fontSize:13,opacity:editing?1:0.6}}>✎</button>
        <button className="assignee-pill" onClick={()=>onCycleAss(task.assignee)}>{task.assignee}</button>
        <button className="btn-icon" onClick={onDelete}>×</button>
      </div>
      {task.expanded && (
        <div className="tm-expand">
          <textarea className="note-inp" rows={2} placeholder="Notiz…" value={task.note} onChange={e=>onPatch({note:e.target.value})}/>
          {task.subtasks.length>0 && (
            <div className="subs">
              {task.subtasks.map(s=>(
                <div className="sub-row" key={s.id}>
                  <input type="checkbox" checked={s.done} onChange={e=>onPatchSub(s.id,{done:e.target.checked})}/>
                  <span className={`sub-title${s.done?" done":""}`}>{s.title}</span>
                  <button className="btn-icon" style={{fontSize:12}} onClick={()=>onDelSub(s.id)}>×</button>
                </div>
              ))}
            </div>
          )}
          <div className="sub-actions">
            <input className="add-task-inp" style={{fontSize:12,padding:"4px 8px"}} placeholder="Unterpunkt…"
              value={newSub} onChange={e=>setNewSub(e.target.value)}
              onKeyDown={e=>{if(e.key==="Enter"&&newSub.trim()){onAddSub(newSub.trim());setNewSub("")}}}/>
            <button className="btn-primary" style={{fontSize:11,padding:"4px 10px"}} onClick={()=>{if(newSub.trim()){onAddSub(newSub.trim());setNewSub("")}}}>+ Sub</button>
          </div>
        </div>
      )}
    </div>
  );
}

function ProjectCard({project,filterAss,filterSt,onUpdate,onDelete,isDragging,isDragOver,dragHandleProps,onDragEnter,onDragEnd}) {
  const [addingTask,setAddingTask]=useState(false);
  const [newTitle,setNewTitle]=useState("");
  const patch=(tid,p)=>onUpdate({...project,tasks:project.tasks.map(t=>t.id===tid?{...t,...p}:t)});
  const cycleSt=(tid,cur)=>{const i=STATUS_CYCLE.indexOf(cur);patch(tid,{status:STATUS_CYCLE[(i+1)%STATUS_CYCLE.length]})};
  const cycleAss=(tid,cur)=>{const i=ASSIGNEE_CYCLE.indexOf(cur);patch(tid,{assignee:ASSIGNEE_CYCLE[(i+1)%ASSIGNEE_CYCLE.length]})};
  const visible=project.tasks.filter(t=>(filterAss.length===0||filterAss.includes("Alle")||filterAss.includes(t.assignee))&&(filterSt.length===0||filterSt.includes("Alle")||filterSt.includes(t.status)));
  let cardClass="tm-project";
  if(isDragging)cardClass+=" dragging";
  if(isDragOver)cardClass+=" drag-over";
  return (
    <div className={cardClass} onDragEnter={onDragEnter} onDragEnd={onDragEnd} onDragOver={e=>e.preventDefault()}>
      <div className="tm-proj-hd">
        <span className="drag-handle" {...dragHandleProps}>⠿</span>
        <span className="tm-proj-name">{project.name}</span>
        <span className="tm-proj-count">{project.tasks.length} Tasks</span>
        <button className="btn-icon" onClick={()=>setAddingTask(a=>!a)}>+</button>
        <button className="btn-icon" onClick={onDelete}>×</button>
      </div>
      {visible.map(task=>(
        <TaskRow key={task.id} task={task}
          onPatch={p=>patch(task.id,p)} onDelete={()=>onUpdate({...project,tasks:project.tasks.filter(t=>t.id!==task.id)})}
          onCycleSt={cur=>cycleSt(task.id,cur)} onCycleAss={cur=>cycleAss(task.id,cur)}
          onAddSub={title=>patch(task.id,{subtasks:[...(project.tasks.find(t=>t.id===task.id)?.subtasks||[]),{id:uid(),title,done:false}]})}
          onPatchSub={(sid,p)=>patch(task.id,{subtasks:project.tasks.find(t=>t.id===task.id)?.subtasks.map(s=>s.id===sid?{...s,...p}:s)||[]})}
          onDelSub={sid=>patch(task.id,{subtasks:project.tasks.find(t=>t.id===task.id)?.subtasks.filter(s=>s.id!==sid)||[]})}
        />
      ))}
      {visible.length===0&&project.tasks.length>0 && <div style={{padding:"10px 16px",fontSize:12,color:"var(--muted)"}}>Keine Tasks für diesen Filter.</div>}
      {addingTask && (
        <div className="add-task-row">
          <input className="add-task-inp" placeholder="Neue Aufgabe…" value={newTitle}
            onChange={e=>setNewTitle(e.target.value)}
            onKeyDown={e=>{if(e.key==="Enter"&&newTitle.trim()){onUpdate({...project,tasks:[...project.tasks,mkTask(newTitle.trim())]});setNewTitle("");setAddingTask(false)}if(e.key==="Escape"){setAddingTask(false);setNewTitle("")}}}
            autoFocus/>
          <button className="btn-primary" onClick={()=>{if(newTitle.trim()){onUpdate({...project,tasks:[...project.tasks,mkTask(newTitle.trim())]});setNewTitle("");setAddingTask(false)}}}>Hinzufügen</button>
          <button className="btn-cancel" onClick={()=>{setAddingTask(false);setNewTitle("")}}>Abbrechen</button>
        </div>
      )}
    </div>
  );
}

function TaskManagerView({projects,setProjects,saveProjects}) {
  const [filterAss,setFilterAss]=useState(["Alle"]);
  const [filterSt,setFilterSt]=useState(["Alle"]);
  const [addingBV,setAddingBV]=useState(false);
  const [newBVName,setNewBVName]=useState("");
  const [orderedProjects,setOrderedProjects]=useState(projects);
  useEffect(()=>{setOrderedProjects(projects)},[projects]);
  const dragIdx=useRef(null),dragOverIdx=useRef(null),touchTimer=useRef(null),touchDragging=useRef(false);
  const [draggingId,setDraggingId]=useState(null),[dragOverId,setDragOverId]=useState(null);
  const update=p=>{setProjects(p);setOrderedProjects(p);saveProjects(p)};
  const toggleFilter=(arr,setArr,val)=>{if(val==="Alle"){setArr(["Alle"]);return}const without=arr.filter(x=>x!=="Alle"&&x!==val);const has=arr.includes(val);const next=has?(without.length?without:["Alle"]):[...without,val];setArr(next.length?next:["Alle"])};
  const handleDragStart=(idx,id)=>{dragIdx.current=idx;setDraggingId(id)};
  const handleDragEnter=(idx,id)=>{if(dragIdx.current===null||idx===dragIdx.current)return;const next=[...orderedProjects];const[moved]=next.splice(dragIdx.current,1);next.splice(idx,0,moved);dragIdx.current=idx;setDragOverId(id);setOrderedProjects(next)};
  const handleDragEnd=()=>{if(orderedProjects!==projects)update(orderedProjects);dragIdx.current=null;dragOverIdx.current=null;setDraggingId(null);setDragOverId(null)};
  const makeTouchHandlers=(idx,id)=>({
    onTouchStart:(e)=>{touchTimer.current=setTimeout(()=>{touchDragging.current=true;dragIdx.current=idx;setDraggingId(id);navigator.vibrate&&navigator.vibrate(40)},400)},
    onTouchMove:(e)=>{if(!touchDragging.current){clearTimeout(touchTimer.current);return}e.preventDefault();const t=e.touches[0];const el=document.elementFromPoint(t.clientX,t.clientY);const card=el?.closest(".tm-project");if(!card)return;const all=[...document.querySelectorAll(".tm-project")];const toIdx=all.indexOf(card);if(toIdx!==-1&&toIdx!==dragIdx.current){const next=[...orderedProjects];const[moved]=next.splice(dragIdx.current,1);next.splice(toIdx,0,moved);dragIdx.current=toIdx;setDragOverId(orderedProjects[toIdx]?.id);setOrderedProjects(next)}},
    onTouchEnd:()=>{clearTimeout(touchTimer.current);if(touchDragging.current)update(orderedProjects);touchDragging.current=false;dragIdx.current=null;setDraggingId(null);setDragOverId(null)},
  });
  const openCount=orderedProjects.reduce((s,p)=>s+p.tasks.filter(t=>t.status!=="erledigt").length,0);
  const waitCount=orderedProjects.reduce((s,p)=>s+p.tasks.filter(t=>t.status==="wartend").length,0);
  const doneCount=orderedProjects.reduce((s,p)=>s+p.tasks.filter(t=>t.status==="erledigt").length,0);
  return (
    <div className="page" id="print-area">
      <div className="print-header">Aufgabenliste – BV-Manager</div>
      <div className="print-date">Erstellt: {new Date().toLocaleDateString("de-DE",{day:"2-digit",month:"2-digit",year:"numeric"})}</div>
      <div className="summary">
        <div className="sum-card"><div className="sum-val">{orderedProjects.length}</div><div className="sum-label">Projekte</div></div>
        <div className="sum-card"><div className="sum-val" style={{color:"#64748b"}}>{openCount}</div><div className="sum-label">Offen</div></div>
        <div className="sum-card"><div className="sum-val" style={{color:"#f59e0b"}}>{waitCount}</div><div className="sum-label">Wartend</div></div>
        <div className="sum-card"><div className="sum-val" style={{color:"#4ade80"}}>{doneCount}</div><div className="sum-label">Erledigt</div></div>
      </div>
      <div className="filters">
        <div className="filter-group"><span>Zuständig:</span>{["Alle","HP","DP","–"].map(a=><button key={a} className={`f-btn${filterAss.includes(a)?" active":""}`} onClick={()=>toggleFilter(filterAss,setFilterAss,a)}>{a}</button>)}</div>
        <div className="filter-group"><span>Status:</span>{["Alle",...STATUS_CYCLE].map(s=><button key={s} className={`f-btn${filterSt.includes(s)?" active":""}`} onClick={()=>toggleFilter(filterSt,setFilterSt,s)} style={filterSt.includes(s)&&s!=="Alle"?{background:STATUS_META[s]?.color,borderColor:STATUS_META[s]?.color,color:"#0d1117"}:{}}>{s==="Alle"?"Alle":STATUS_META[s].label}</button>)}</div>
      </div>
      {orderedProjects.length===0 && <div className="empty">Noch keine Projekte.</div>}
      {orderedProjects.map((p,idx)=>(
        <ProjectCard key={p.id} project={p} filterAss={filterAss} filterSt={filterSt}
          isDragging={draggingId===p.id} isDragOver={dragOverId===p.id&&draggingId!==p.id}
          dragHandleProps={{draggable:true,onDragStart:(e)=>{e.stopPropagation();handleDragStart(idx,p.id)},...makeTouchHandlers(idx,p.id)}}
          onUpdate={updated=>update(orderedProjects.map(x=>x.id===p.id?updated:x))}
          onDelete={()=>update(orderedProjects.filter(x=>x.id!==p.id))}
          onDragEnter={()=>handleDragEnter(idx,p.id)} onDragEnd={handleDragEnd}/>
      ))}
      {addingBV?(
        <div className="add-bv-row">
          <input className="add-bv-inp" placeholder="Name des neuen BV…" value={newBVName}
            onChange={e=>setNewBVName(e.target.value)}
            onKeyDown={e=>{if(e.key==="Enter"&&newBVName.trim()){update([...orderedProjects,{id:uid(),name:newBVName.trim(),tasks:[]}]);setNewBVName("");setAddingBV(false)}if(e.key==="Escape"){setAddingBV(false);setNewBVName("")}}}
            autoFocus/>
          <button className="btn-primary" onClick={()=>{if(newBVName.trim()){update([...orderedProjects,{id:uid(),name:newBVName.trim(),tasks:[]}]);setNewBVName("");setAddingBV(false)}}}>Erstellen</button>
          <button className="btn-cancel" onClick={()=>{setAddingBV(false);setNewBVName("")}}>Abbrechen</button>
        </div>
      ):(
        <button className="btn-primary" style={{marginTop:12}} onClick={()=>setAddingBV(true)}>+ Neues BV</button>
      )}
    </div>
  );
}

function VergabeView({vergabeData,setVergabeData,saveVergabe,allBVs,handwerker}) {

  const [showDone,setShowDone] = useState(false);

  const updateCell=(bvNum,gw,field,val)=>{
    const next={...vergabeData,[bvNum]:{...vergabeData[bvNum],[gw]:{...(vergabeData[bvNum]?.[gw]||{}),[field]:val}}};
    setVergabeData(next);saveVergabe(next);
  };

  const hwName=(id)=>{const h=handwerker.find(x=>x.id===id);return h?h.firma.slice(0,6):''};

  // Summary stats
  const totalCells=bvList.length*GEWERKE.length;
  const stats={x:0,a:0,'!':0,n:0,'':0};
  bvList.forEach(bv=>GEWERKE.forEach(g=>{const s=(vergabeData[bv.num]?.[g]?.status)||'';stats[s]=(stats[s]||0)+1}));

  return (

        <h2 style={{fontSize:15,fontWeight:600,color:'var(--text)',margin:0}}>Vergabe-Übersicht</h2>
        <div style={{display:'flex',gap:8,flexWrap:'wrap',flex:1}}>
          {[['x','Vergeben','#4ade80'],['a','Angefragt','#f59e0b'],['!','Ausstehend','#f87171'],['n','Entfällt','#475569'],['','Offen','#64748b']].map(([s,l,c])=>(
            <div key={s} style={{display:'flex',alignItems:'center',gap:5,fontSize:12}}>
              <span style={{width:12,height:12,borderRadius:3,background:VG_META[s].bg,border:`1px solid ${VG_META[s].border}`,display:'inline-block'}}/>
              <span style={{color:c,fontWeight:600}}>{stats[s]||0}</span>
              <span style={{color:'var(--muted)'}}>{l}</span>

          <thead>
            <tr>
              <th className="vg-th-bv">BV</th>
              {GEWERKE.map((g,i)=>(
                <th key={g} className="vg-th-gw" title={g}>{GW_ABBR[i]}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {bvList.map(bv=>(
              <tr key={bv.num}>
                <td className="vg-td-bv">{bv.name}</td>
                {GEWERKE.map((g,i)=>{
                  const cell=vergabeData[bv.num]?.[g]||{status:'',hw:''};
                  const m=VG_META[cell.status||''];
                  const hwLabel=cell.hw?hwName(cell.hw):'';
                  return (
                    <td key={g} className="vg-cell"
                      style={{background:m.bg,borderBottom:`1px solid var(--border)`}}

      <div style={{marginTop:10,display:'flex',gap:16,flexWrap:'wrap',fontSize:11,color:'var(--muted)'}}>
        {GEWERKE.map((g,i)=><span key={g}><strong style={{color:'var(--text)'}}>{GW_ABBR[i]}</strong> = {g}</span>)}

function ChecklisteView({checklisteData,setChecklisteData,saveCheckliste,allBVs}) {
  const [openCell,setOpenCell] = React.useState(null);

  const getCellData = (bvNum,itemId)=>(checklisteData[bvNum]||{})[itemId]||null;

  const handleSave = (bvNum,itemId,val)=>{
    setChecklisteData(prev=>{
      const next = {...prev,[bvNum]:{...(prev[bvNum]||{}),[itemId]:val}};
      saveCheckliste(next);
      return next;
    });
  };

  // Build flat item list for popup lookup
  const allItems = CL_PHASES.flatMap(p=>p.items.map(it=>({...it,phaseColor:p.color})));
  const getItem = id=>allItems.find(i=>i.id===id)||{id,label:id};

  return React.createElement('div',{style:{padding:'0'}},
    React.createElement('div',{className:'clm-wrap'},
      React.createElement('table',{className:'clm-table'},
        // Header rows
        React.createElement('thead',null,
          // Row 1: phase group headers
          React.createElement('tr',null,
            React.createElement('th',{className:'clm-th-bv',rowSpan:2,style:{zIndex:5}},'Bauvorhaben'),
            CL_PHASES.map(p=>
              React.createElement('th',{
                key:p.id,
                className:'clm-phase-hd',
                colSpan:p.items.length,
                style:{borderBottom:'2px solid '+p.color,color:p.color}
              },p.label)
            )
          ),
          // Row 2: rotated item headers
          React.createElement('tr',null,
            CL_PHASES.flatMap(p=>p.items.map(it=>
              React.createElement('th',{key:it.id,className:'clm-th-item',title:it.label},
                React.createElement('span',null,it.label)
              )
            ))
          )
        ),
        // Body rows
        React.createElement('tbody',null,
          allBVs.map(bv=>{
            const bvData = checklisteData[bv.num]||{};
            const total = allItems.length;
            const done = Object.values(bvData).filter(v=>v&&(v.st==='x'||v.done)).length;
            const pct = total>0?Math.round(done/total*100):0;
            return React.createElement('tr',{key:bv.num},
              React.createElement('td',{className:'clm-td-bv'},
                React.createElement('div',null,bv.label),
                React.createElement('div',{style:{
                  marginTop:'3px',height:'3px',background:'var(--border)',borderRadius:'2px',overflow:'hidden'
                }},
                  React.createElement('div',{style:{
                    height:'100%',borderRadius:'2px',background:'#4ade80',
                    width:pct+'%',transition:'width .3s'
                  }})
                )
              ),
              CL_PHASES.flatMap(p=>p.items.map(it=>{
                const d = bvData[it.id]||null;
                const st = d?.st !== undefined ? d.st : (d?.done ? 'x' : '');
                const hasNote = d&&d.note&&d.note.trim().length>0;
                const cellBg = st==='x'?'rgba(74,222,128,.15)':st==='!'?'rgba(248,113,113,.13)':st==='n'?'rgba(30,41,59,.4)':'';
                const cellTxt = st==='x'?React.createElement('span',{style:{color:'#4ade80',fontSize:'13px'}},'✓')
                               :st==='!'?React.createElement('span',{style:{color:'#f87171',fontSize:'13px'}},'!')
                               :st==='n'?React.createElement('span',{style:{color:'#475569',fontSize:'10px'}},'n/a')
                               :null;
                return React.createElement('td',{
                  key:it.id,
                  className:'clm-cell',
                  style:{background:cellBg, borderBottom:'1px solid var(--border)'},
                  onClick:()=>setOpenCell({bvNum:bv.num,itemId:it.id})
                },
                  React.createElement('div',{className:'clm-cell-inner'}, cellTxt),
                  hasNote?React.createElement('div',{className:'clm-note-dot'}):null
                );
              }))
            );
          })
        )
      )
    ),
    openCell&&React.createElement(ClCellPopup,{
      key:openCell.bvNum+'-'+openCell.itemId,
      bvNum:openCell.bvNum,
      item:getItem(openCell.itemId),
      cellData:getCellData(openCell.bvNum,openCell.itemId),
      onClose:()=>setOpenCell(null),
      onSave:(val)=>handleSave(openCell.bvNum,openCell.itemId,val)
    })
  );
}

const DAYS = ['Mo','Di','Mi','Do','Fr'];

function TagesplanungView({tagesplanData,setTagesplanData,saveTagesplan,activeBVs}) {
  const cur = getKWNow();
  const [kw,setKw] = useState(cur.kw);
  const [year,setYear] = useState(cur.year);
  const [showAll,setShowAll] = useState(false);

  const kwKey = `${kw}-${year}`;
  const mon = getMonday(kw,year);
  const days = Array.from({length:5},(_,i)=>{ const d=new Date(mon); d.setDate(d.getDate()+i); return d; });

  const todayStr = fmtDD(new Date());
  const bvList = showAll ? activeBVs : activeBVs.slice(0,20);

  const getCellVal=(bvNum,dayIdx)=>(tagesplanData[kwKey]?.[bvNum]?.[dayIdx])||'';
  const setCell=(bvNum,dayIdx,val)=>{
    const next={...tagesplanData,[kwKey]:{...(tagesplanData[kwKey]||{}),[bvNum]:{...(tagesplanData[kwKey]?.[bvNum]||{}),[dayIdx]:val}}};
    setTagesplanData(next);saveTagesplan(next);
  };

  const prevKW=()=>{ if(kw===1){setKw(52);setYear(y=>y-1)}else setKw(k=>k-1) };
  const nextKW=()=>{ if(kw===52){setKw(1);setYear(y=>y+1)}else setKw(k=>k+1) };
  const goToday=()=>{ const c=getKWNow();setKw(c.kw);setYear(c.year) };

  return (
    <div className="page-wide">
      <div className="tp-controls">
        <div className="tp-kw-nav">
          <button className="btn-sm" onClick={prevKW}>‹</button>
          <div style={{textAlign:'center'}}>
            <div className="tp-kw-label">KW {kw} / {year}</div>
            <div className="tp-kw-dates">{fmtDD(days[0])} – {fmtDD(days[4])}</div>
          </div>
          <button className="btn-sm" onClick={nextKW}>›</button>
        </div>
        <button className="btn-sm" onClick={goToday}>Heute</button>
        <label style={{display:'flex',alignItems:'center',gap:6,fontSize:12,color:'var(--muted)',cursor:'pointer',marginLeft:'auto'}}>
          <input type="checkbox" checked={showAll} onChange={e=>setShowAll(e.target.checked)} style={{accentColor:'var(--accent)'}}/>
          Alle BV anzeigen
        </label>
      </div>

      <div className="tp-wrap">
        <table className="tp-table">
          <thead>
            <tr>
              <th className="tp-th-bv">BV</th>
              {days.map((d,i)=>(
                <th key={i} className={`tp-th-day${fmtDD(d)===todayStr?' today':''}`}>
                  {DAYS[i]}<br/>
                  <span style={{fontWeight:400}}>{fmtDD(d)}</span>
                </th>
              ))}
            </tr>
          </thead>
          <tbody>
            {bvList.map(bv=>(
              <tr key={bv.num}>
                <td className="tp-td-bv" title={bv.num}>{bv.name.replace('BV ','')}</td>
                {days.map((_,dayIdx)=>(
                  <td key={dayIdx} className="tp-cell">
                    <textarea className="tp-cell-inp"
                      value={getCellVal(bv.num,dayIdx)}
                      onChange={e=>setCell(bv.num,dayIdx,e.target.value)}
                      placeholder="…"/>
                  </td>
                ))}
              </tr>
            ))}
          </tbody>
        </table>
      </div>
      {!showAll && activeBVs.length>20 && (
        <div style={{marginTop:10,fontSize:12,color:'var(--muted)',textAlign:'center'}}>
          {activeBVs.length-20} weitere BV ausgeblendet.
          <button className="btn-sm" style={{marginLeft:8}} onClick={()=>setShowAll(true)}>Alle anzeigen</button>
        </div>
      )}
    </div>
  );
}

function StammdatenView({handwerker,setHandwerker,saveHandwerker}) {
  const [filterGw,setFilterGw] = useState('');
  const allGw = [...new Set([...GEWERKE,...handwerker.map(h=>h.gewerk).filter(Boolean)])].sort();

  const update=(id,updated)=>{
    const next=handwerker.map(h=>h.id===id?updated:h);
    setHandwerker(next);saveHandwerker(next);
  };
  const del=(id)=>{
    const next=handwerker.filter(h=>h.id!==id);
    setHandwerker(next);saveHandwerker(next);
  };
  const add=()=>{
    const neu={id:uid(),firma:'',name:'',gewerk:filterGw||'',tel:'',email:'',notiz:''};
    const next=[...handwerker,neu];
    setHandwerker(next);saveHandwerker(next);
  };

  const filtered = filterGw ? handwerker.filter(h=>h.gewerk===filterGw) : handwerker;

  return (
    <div className="page">
      <div className="hk-toolbar">
        <button className="btn-primary" onClick={add}>+ Handwerker hinzufügen</button>
        <div className="hk-gw-filter">
          <button className={`btn-sm${!filterGw?' active':''}`}
            style={!filterGw?{background:'var(--accent)',borderColor:'var(--accent)',color:'#0d1117',fontWeight:700}:{}}
            onClick={()=>setFilterGw('')}>Alle ({handwerker.length})</button>
          {allGw.filter(g=>handwerker.some(h=>h.gewerk===g)).map(g=>(
            <button key={g}
              className={`btn-sm${filterGw===g?' active':''}`}
              style={filterGw===g?{background:'var(--accent)',borderColor:'var(--accent)',color:'#0d1117',fontWeight:700}:{}}
              onClick={()=>setFilterGw(g)}>
              {g} ({handwerker.filter(h=>h.gewerk===g).length})
            </button>
          ))}
        </div>
      </div>
      {filtered.length===0 && (
        <div className="empty">
          {filterGw ? `Keine Handwerker für Gewerk "${filterGw}".` : 'Noch keine Handwerker angelegt.'}
          <br/><button className="btn-primary" style={{marginTop:12}} onClick={add}>Ersten Handwerker anlegen</button>
        </div>
      )}
      <div className="hk-grid">
        {filtered.map(hw=>(
          <HandwerkerCard key={hw.id} hw={hw}
            onChange={updated=>update(hw.id,updated)}
            onDelete={()=>del(hw.id)}/>
        ))}
      </div>
    </div>
  );
}


/* ══════════════════════════════════════════════════════════════
   PDF EXPORT
══════════════════════════════════════════════════════════════ */
function exportPDF(projects) {
  const btn=document.getElementById("pdf-btn");
  if(btn){btn.textContent="Erstelle...";btn.disabled=true}
  function doExport(){
    try {
      const{jsPDF}=window.jspdf;
      const doc=new jsPDF({orientation:"portrait",unit:"mm",format:"a4"});
      const pw=180,ml=15;
      const SL={offen:"Offen","in-arbeit":"In Arbeit",wartend:"Wartend",erledigt:"Erledigt"};
      const SC={offen:[71,85,105],"in-arbeit":[146,64,14],wartend:[67,56,202],erledigt:[22,101,52]};
      const SB={offen:[241,245,249],"in-arbeit":[254,249,236],wartend:[243,242,255],erledigt:[240,255,246]};
      const AC={HP:[26,111,181],DP:[181,90,26]};
      const date=new Date().toLocaleDateString("de-DE",{day:"2-digit",month:"2-digit",year:"numeric"});
      const tot=projects.reduce((s,p)=>s+p.tasks.length,0);
      doc.setFillColor(15,23,42);doc.roundedRect(ml,12,pw,12,2,2,"F");
      doc.setFont("helvetica","bold");doc.setFontSize(12);doc.setTextColor(255,255,255);
      doc.text("BV-Aufgabenliste",ml+4,20);
      doc.setFont("helvetica","normal");doc.setFontSize(8);doc.setTextColor(148,163,184);
      doc.text("Erstellt: "+date+"  |  "+projects.length+" Projekte  |  "+tot+" Aufgaben",ml+pw-4,20,{align:"right"});
      let y=28;const lh=7;
      const np=(n)=>{if(y+n>282){doc.addPage();y=15}};
      for(const p of projects){
        np(14);doc.setFillColor(30,41,59);doc.rect(ml,y,pw,8,"F");
        doc.setFont("helvetica","bold");doc.setFontSize(10);doc.setTextColor(255,255,255);doc.text(p.name,ml+3,y+5.5);
        doc.setFont("helvetica","normal");doc.setFontSize(8);doc.setTextColor(148,163,184);doc.text(p.tasks.length+" Tasks",ml+pw-3,y+5.5,{align:"right"});y+=8;
        doc.setFillColor(248,250,252);doc.rect(ml,y,pw,6,"F");doc.setFont("helvetica","bold");doc.setFontSize(7.5);doc.setTextColor(100,116,139);
        doc.text("Aufgabe",ml+3,y+4);doc.text("Status",ml+pw*0.72,y+4,{align:"center"});doc.text("Wer",ml+pw*0.92,y+4,{align:"center"});
        doc.setDrawColor(226,232,240);doc.setLineWidth(0.2);doc.line(ml,y+6,ml+pw,y+6);y+=6;
        for(let i=0;i<p.tasks.length;i++){
          const t=p.tasks[i];const sl=SL[t.status]||t.status;const sbg=SB[t.status]||[241,245,249];const sfg=SC[t.status]||[71,85,105];const afg=AC[t.assignee]||[136,136,136];
          const done=t.status==="erledigt";const hn=!!(t.note&&t.note.trim());const hs=!!(t.subtasks&&t.subtasks.length>0);
          const rh=lh+(hn?4:0)+(hs?t.subtasks.length*4:0);np(rh+1);
          const rb=i%2===0?[248,250,252]:[255,255,255];
          doc.setFillColor(...rb);doc.rect(ml,y,pw*0.62,rh,"F");doc.setFillColor(...sbg);doc.rect(ml+pw*0.62,y,pw*0.22,rh,"F");doc.setFillColor(...rb);doc.rect(ml+pw*0.84,y,pw*0.16,rh,"F");
          doc.setFont("helvetica","normal");doc.setFontSize(9);doc.setTextColor(...(done?[180,180,180]:[34,34,34]));doc.text(doc.splitTextToSize(t.title,pw*0.58)[0],ml+3,y+5);
          if(hn){doc.setFont("helvetica","italic");doc.setFontSize(7.5);doc.setTextColor(102,102,102);doc.text(doc.splitTextToSize(t.note,pw*0.58)[0],ml+3,y+9)}
          if(hs){let sy=y+(hn?13:9);t.subtasks.forEach(s=>{doc.setFont("helvetica","normal");doc.setFontSize(7.5);doc.setTextColor(s.done?180:100);doc.text((s.done?"v ":"- ")+s.title,ml+5,sy);sy+=4})}
          doc.setFont("helvetica","bold");doc.setFontSize(8);doc.setTextColor(...sfg);doc.text(sl,ml+pw*0.73,y+5,{align:"center"});
          doc.setFont("helvetica","bold");doc.setFontSize(9);doc.setTextColor(...afg);doc.text(t.assignee,ml+pw*0.92,y+5,{align:"center"});
          doc.setDrawColor(226,232,240);doc.setLineWidth(0.15);doc.line(ml,y+rh,ml+pw,y+rh);y+=rh;
        }y+=5;
      }
      const pages=doc.getNumberOfPages();
      for(let i=1;i<=pages;i++){doc.setPage(i);doc.setFont("helvetica","normal");doc.setFontSize(7);doc.setTextColor(150,150,150);doc.text("Seite "+i+" / "+pages,195,290,{align:"right"})}
      doc.save("BV-Aufgabenliste_"+date.replace(/\./g,"-")+".pdf");
    }catch(e){alert("PDF-Fehler: "+e.message)}
    finally{if(btn){btn.textContent="PDF exportieren";btn.disabled=false}}
  }
  if(window.jspdf){doExport()}
  else{const s=document.createElement("script");s.src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js";s.onload=doExport;s.onerror=()=>{alert("jsPDF konnte nicht geladen werden.");if(btn){btn.textContent="PDF exportieren";btn.disabled=false}};document.head.appendChild(s)}
}

/* ══════════════════════════════════════════════════════════════
   APP ROOT
══════════════════════════════════════════════════════════════ */
const APP_VERSION = "2.2.0-preview";


/* ══════════════════════════════════════════════════════════════
   DATENSICHERUNG
══════════════════════════════════════════════════════════════ */
function exportAllData(bvList, vergabeData, checklisteData, tagesplanData, handwerker, projects) {
  const payload = {
    version: APP_VERSION,
    exportedAt: new Date().toISOString(),
    bvList, vergabeData, checklisteData, tagesplanData, handwerker, projects
  };
  const json = JSON.stringify(payload, null, 2);
  const blob = new Blob([json], {type: 'application/json'});
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  const date = new Date().toISOString().slice(0,10);
  a.href = url; a.download = `BV-Manager_Backup_${date}.json`; a.click();
  URL.revokeObjectURL(url);
}

function importAllData(file, cb) {
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const d = JSON.parse(e.target.result);
      cb(d);
    } catch(err) { alert('Fehler beim Einlesen der Datei: ' + err.message); }
  };
  reader.readAsText(file);
}

function App() {
  const [tab,setTab]               = useState("uebersicht");
  const [projects,setProjects]     = useState(DEFAULT_TASKS);
  const [bvList,setBvList]         = useState(EXCEL_BV_LIST);
  const [vergabeData,setVergabeData]       = useState(()=>buildVergabe(EXCEL_BV_LIST,null));
  const [checklisteData,setChecklisteData] = useState(()=>buildCheckliste(EXCEL_BV_LIST,null));
  const [tagesplanData,setTagesplanData]   = useState({});
  const [handwerker,setHandwerker]         = useState(DEFAULT_HW);
  const [loaded,setLoaded] = useState(false);

  useEffect(()=>{
    const link=document.createElement("link");
    link.rel="stylesheet";link.href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&display=swap";
    document.head.appendChild(link);
    const el=document.createElement("style");el.textContent=CSS;document.head.appendChild(el);
    return()=>{try{document.head.removeChild(el);document.head.removeChild(link)}catch{}};
  },[]);

  useEffect(()=>{
    // Show app immediately with defaults — localStorage overrides applied async
    setLoaded(true);
    (async()=>{
      try{const t=await window.storage.get(SK_TASKS);if(t?.value)setProjects(JSON.parse(t.value))}catch{}
      try{
        const b=await window.storage.get(SK_BVS);
        const bvs=b?.value?JSON.parse(b.value):null;
        if(bvs&&bvs.length>0){
          setBvList(bvs);
          // rebuild derived data with saved BV list
          try{const vg=await window.storage.get(SK_VERGABE);setVergabeData(buildVergabe(bvs,vg?.value?JSON.parse(vg.value):null))}catch{setVergabeData(buildVergabe(bvs,null))}
          try{const cl=await window.storage.get(SK_CHKLIST);setChecklisteData(buildCheckliste(bvs,cl?.value?JSON.parse(cl.value):null))}catch{setChecklisteData(buildCheckliste(bvs,null))}
        } else {
          try{const vg=await window.storage.get(SK_VERGABE);if(vg?.value)setVergabeData(buildVergabe(EXCEL_BV_LIST,JSON.parse(vg.value)))}catch{}
          try{const cl=await window.storage.get(SK_CHKLIST);if(cl?.value)setChecklisteData(buildCheckliste(EXCEL_BV_LIST,JSON.parse(cl.value)))}catch{}
        }
      }catch(e){console.warn('Storage load:',e)}
      try{const tp=await window.storage.get(SK_TPLAN);if(tp?.value)setTagesplanData(JSON.parse(tp.value))}catch{}
      try{const hw=await window.storage.get(SK_HW);if(hw?.value)setHandwerker(JSON.parse(hw.value))}catch{}
    })();
  },[]);

  const saveProjects   = useCallback(d=>window.storage.set(SK_TASKS,JSON.stringify(d)).catch(()=>{}),[]);
  const saveBvList     = useCallback(d=>window.storage.set(SK_BVS,JSON.stringify(d)).catch(()=>{}),[]);
  const saveVergabe    = useCallback(d=>window.storage.set(SK_VERGABE,JSON.stringify(d)).catch(()=>{}),[]);
  const saveCheckliste = useCallback(d=>window.storage.set(SK_CHKLIST,JSON.stringify(d)).catch(()=>{}),[]);
  const saveTagesplan  = useCallback(d=>window.storage.set(SK_TPLAN,JSON.stringify(d)).catch(()=>{}),[]);
  const saveHandwerker = useCallback(d=>window.storage.set(SK_HW,JSON.stringify(d)).catch(()=>{}),[]);

  const importFileRef = useRef(null);
  const handleImport = (d) => {
    if (!d) return;
    if (d.bvList)         { setBvList(d.bvList);          saveBvList(d.bvList); }
    if (d.vergabeData)    { setVergabeData(d.vergabeData); saveVergabe(d.vergabeData); }
    if (d.checklisteData) { setChecklisteData(d.checklisteData); saveCheckliste(d.checklisteData); }
    if (d.tagesplanData)  { setTagesplanData(d.tagesplanData); saveTagesplan(d.tagesplanData); }
    if (d.handwerker)     { setHandwerker(d.handwerker);   saveHandwerker(d.handwerker); }
    if (d.projects)       { setProjects(d.projects);       saveProjects(d.projects); }
    alert('Import erfolgreich! ' + (d.exportedAt ? 'Stand: '+d.exportedAt.slice(0,10) : ''));
  };

  const rohbauBVs = useMemo(()=>bvList.filter(b=>b.status==='rohbau'),[bvList]);

  // Keep vergabeData in sync when new BVs are added
  useEffect(()=>{
    setVergabeData(prev=>{
      let changed=false;
      const next={...prev};
      bvList.forEach(bv=>{
        if(!next[bv.num]){
          const raw=EXCEL_VG[bv.num]||[];
          const e={};
          GEWERKE.forEach((g,i)=>{e[g]={status:normV(raw[i]||''),hw:''};});
          next[bv.num]=e;
          changed=true;
        }
      });
      return changed?next:prev;
    });
  },[bvList]);

  if(!loaded) return (
    <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",color:"#7d8590",fontFamily:"sans-serif",fontSize:14}}>
      Lade…
    </div>
  );

  const TABS = [
    {id:"uebersicht", label:"🏗 Übersicht BV"},
    {id:"aufgaben",   label:"◈ Aufgaben"},
    {id:"vergabe",    label:"⊞ Vergabe"},
    {id:"checkliste", label:"☑ Checkliste"},
    {id:"tagesplan",  label:"📅 Tagesplanung"},
    {id:"stammdaten", label:"👷 Handwerker"},
  ];

  return (
    <div>
      <nav className="nav">
        {TABS.map(t=>(
          <button key={t.id} className={`nav-btn${tab===t.id?" active":""}`} onClick={()=>setTab(t.id)}>{t.label}</button>
        ))}
        <div className="nav-spacer"/>
        {tab==="aufgaben" && (
          <button id="pdf-btn" className="print-btn" onClick={()=>exportPDF(projects)}>PDF exportieren</button>
        )}
        <button className="print-btn" style={{color:'#4ade80',borderColor:'rgba(74,222,128,.3)'}}
          onClick={()=>exportAllData(bvList,vergabeData,checklisteData,tagesplanData,handwerker,projects)}
          title="Alle Daten als JSON-Backup herunterladen">
          ⬇ Backup
        </button>
        <button className="print-btn" style={{color:'#f59e0b',borderColor:'rgba(245,158,11,.3)'}}
          onClick={()=>importFileRef.current?.click()}
          title="Backup wiederherstellen">
          ⬆ Restore
        </button>
        <input ref={importFileRef} type="file" accept=".json" style={{display:'none'}}
          onChange={e=>{const f=e.target.files[0];if(f)importAllData(f,handleImport);e.target.value='';}}/>
      </nav>

      {tab==="uebersicht" && <UebersichtBVView bvList={bvList} setBvList={setBvList} saveBvList={saveBvList}/>}
      {tab==="aufgaben"   && <TaskManagerView projects={projects} setProjects={setProjects} saveProjects={saveProjects}/>}
      {tab==="vergabe"    && <VergabeView vergabeData={vergabeData} setVergabeData={setVergabeData} saveVergabe={saveVergabe} allBVs={bvList} handwerker={handwerker}/>}
      {tab==="checkliste" && <ChecklisteView checklisteData={checklisteData} setChecklisteData={setChecklisteData} saveCheckliste={saveCheckliste} allBVs={bvList}/>}
      {tab==="tagesplan"  && <TagesplanungView tagesplanData={tagesplanData} setTagesplanData={setTagesplanData} saveTagesplan={saveTagesplan} activeBVs={rohbauBVs}/>}
      {tab==="stammdaten" && <StammdatenView handwerker={handwerker} setHandwerker={setHandwerker} saveHandwerker={saveHandwerker}/>}

      <div style={{position:"fixed",bottom:10,right:14,fontSize:11,color:"rgba(255,255,255,.35)",fontFamily:"var(--mono)",pointerEvents:"none",zIndex:9999,background:"rgba(0,0,0,.3)",padding:"2px 8px",borderRadius:4}}>
        v{APP_VERSION}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
