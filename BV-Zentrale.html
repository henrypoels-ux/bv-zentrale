  <button id="login-btn" onclick="doLogin()">Mit Microsoft anmelden</button>
</div>

<script>
// ── MSAL Konfiguration ──────────────────────────────────────────
const msalConfig = {
  auth: {
    clientId: "a4673733-968a-44f7-bb8d-31d9cc497f28",
    authority: "https://login.microsoftonline.com/0b826b9f-bc18-4efb-af3d-8f92ea282f7b",
    redirectUri: "https://henrypoels-ux.github.io/bv-zentrale/BV-Zentrale.html", //redirectUri: window.location.href.split('?')[0],
  },
  cache: { cacheLocation: "localStorage" }
};
const msalInstance = new msal.PublicClientApplication(msalConfig);
const SCOPES = ["Files.ReadWrite", "User.Read"];

// OneDrive Pfad – Datei liegt in _Projekte/BV-Zentrale/
const DRIVE_FOLDER = "_Projekte/BV-Zentrale";
const DATA_FILE    = "bv-zentrale-data.json";

let accessToken = null;
let saveTimer   = null;
let cachedItemId = null;

function setStatus(msg) {
  const el = document.getElementById("sync-status");
  if (el) el.textContent = msg;
}

async function getToken() {
  const accounts = msalInstance.getAllAccounts();
  if (!accounts.length) return null;
  try {
    const res = await msalInstance.acquireTokenSilent({ scopes: SCOPES, account: accounts[0] });
    return res.accessToken;
  } catch {
    // Fallback: redirect (funktioniert auf iOS)
    await msalInstance.acquireTokenRedirect({ scopes: SCOPES });
    return null;
  }
}

async function doLogin() {
  try {
    await msalInstance.loginRedirect({ scopes: SCOPES });
    // Seite wird weitergeleitet - handleRedirectPromise übernimmt
  } catch(e) {
    alert("Anmeldung fehlgeschlagen: " + e.message);
  }
}

// ── OneDrive JSON lesen/schreiben ────────────────────────────────
async function odRead() {
  const tok = await getToken();
  // Erst Item-ID suchen (gecacht für Performance)
  if (!cachedItemId) {
    const r = await fetch(
      `https://graph.microsoft.com/v1.0/me/drive/root:/${DRIVE_FOLDER}/${DATA_FILE}`,
      { headers: { Authorization: "Bearer " + tok } }
    );
    if (!r.ok) return null; // Datei existiert noch nicht
    const meta = await r.json();
    cachedItemId = meta.id;
  }
  const r2 = await fetch(
    `https://graph.microsoft.com/v1.0/me/drive/items/${cachedItemId}/content`,
    { headers: { Authorization: "Bearer " + tok } }
  );
  if (!r2.ok) return null;
  return await r2.json();
}

async function odWrite(data) {
  const tok = await getToken();
  const json = JSON.stringify(data);
  // PUT erstellt oder überschreibt die Datei
  const r = await fetch(
    `https://graph.microsoft.com/v1.0/me/drive/root:/${DRIVE_FOLDER}/${DATA_FILE}:/content`,
    {
      method: "PUT",
      headers: { Authorization: "Bearer " + tok, "Content-Type": "application/json" },
      body: json
    }
  );
  if (!r.ok) throw new Error("Speichern fehlgeschlagen: " + r.status);
  const meta = await r.json();
  cachedItemId = meta.id;
}

// ── window.storage Shim (kompatibel mit der App) ─────────────────
// Alle Daten in einem einzigen JSON-Objekt auf OneDrive
let _memCache = null;

window.storage = {
  async get(key) {
    if (!_memCache) {
      setStatus("Lade Daten...");
      try { _memCache = (await odRead()) || {}; } catch { _memCache = {}; }
      setStatus("");
    }
    const val = _memCache[key];
    return val !== undefined ? { key, value: typeof val === "string" ? val : JSON.stringify(val) } : null;
  },
  async set(key, value) {
    if (!_memCache) _memCache = {};
    _memCache[key] = value;
    // Debounced save – schreibt maximal alle 2s
    clearTimeout(saveTimer);
    setStatus("Speichern...");
    saveTimer = setTimeout(async () => {
      try {
        await odWrite(_memCache);
        setStatus("Gespeichert ✓");
        setTimeout(() => setStatus(""), 2000);
      } catch(e) {
        setStatus("Fehler beim Speichern!");
        console.error(e);
      }
    }, 2000);
    return { key, value };
  },
  async delete(key) {
    if (_memCache) delete _memCache[key];
    return { key, deleted: true };
  }
};

// ── App starten ──────────────────────────────────────────────────
async function startApp() {
  document.getElementById("auth-screen").style.display = "none";
  document.getElementById("root").style.display = "block";

  // Ordner anlegen falls nicht vorhanden (silent)
  try {
    const tok = await getToken();
    await fetch(
      "https://graph.microsoft.com/v1.0/me/drive/root:/_Projekte:/children",
      {
        method: "POST",
        headers: { Authorization: "Bearer " + tok, "Content-Type": "application/json" },
        body: JSON.stringify({ name: "BV-Zentrale", folder: {}, "@microsoft.graph.conflictBehavior": "ignore" })
      }
    );
  } catch {}

  ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
}

// Prüfen ob schon eingeloggt (nach Redirect)
msalInstance.handleRedirectPromise().then(async (res) => {
  if (res) { accessToken = res.accessToken; startApp(); return; }
  const accounts = msalInstance.getAllAccounts();
  if (accounts.length > 0) { startApp(); return; }
  // Noch nicht eingeloggt - Login-Screen zeigen (nichts tun)
}).catch(e => {
  console.error("Redirect error:", e);
});
</script>

/* ─── Default Jour-Fix State ─── */
function defaultJFState() {
  const s = { active:{}, done:{} };
  ACTIVE_BVS.forEach((_, i) => {
    s.active[i] = {};
    JF_TOPICS_ACTIVE.forEach(t => { s.active[i][t.id] = false; });
  });
  DONE_BVS.forEach((_, i) => {
    s.done[i] = {};
    JF_TOPICS_DONE.forEach(t => { s.done[i][t.id] = false; });
  });
  return s;
}

`;

/* ══════════════════════════════════════════════════════════════
   COMPONENTS – Jour Fix
══════════════════════════════════════════════════════════════ */
function SrcTag({ src }) {
  if (src === "capmo") return <span className="src-tag src-capmo">Capmo</span>;
  if (src === "excel") return <span className="src-tag src-excel">Excel</span>;
  return <span className="src-tag src-both">Capmo + Excel</span>;
}

const KIND_CYCLE = ["done", "active", "plan"];
const KIND_META  = {
  done:   { label: "Abgeschlossen", color: "#f87171", bg: "rgba(248,113,113,.15)" },
  active: { label: "Laufend",       color: "#4ade80", bg: "rgba(74,222,128,.15)"  },
  plan:   { label: "Vorplanung",    color: "#f59e0b", bg: "rgba(245,158,11,.15)"  },
};

function JFCard({ bv, topics, checks, onToggle, onReset, onDelete, kind, onChangeKind,
                  onDragStart, onDragEnter, onDragEnd, isDragging, isDragOver }) {
  const [open, setOpen] = useState(false);
  const [confirmDelete, setConfirmDelete] = useState(false);
  const checked = topics.filter(t => checks[t.id]).length;
  const pct = Math.round(checked / topics.length * 100);
  const km = KIND_META[kind];
  let cls = "jf-card";
  if (isDragging) cls += " dragging";
  if (isDragOver) cls += " drag-over";
  return (
    <div className={cls} draggable
      onDragStart={onDragStart} onDragEnter={onDragEnter}
      onDragEnd={onDragEnd} onDragOver={e => e.preventDefault()}>
      <div className="jf-header" onClick={() => { if(!confirmDelete) setOpen(o => !o); }}>
        <span className="drag-handle" title="Verschieben" onClick={e => e.stopPropagation()}>⠿</span>
        <span className="jf-num">{bv.num}</span>
        <span className="jf-title">{bv.name}</span>
        <button
          onClick={e => { e.stopPropagation(); onChangeKind(); }}
          style={{fontSize:10, fontWeight:600, padding:"2px 8px", borderRadius:4, border:`1px solid ${km.color}55`,
                  background:km.bg, color:km.color, cursor:"pointer", whiteSpace:"nowrap", flexShrink:0}}>
          {km.label} ▸
        </button>
        <div className="jf-prog">
          <div className="jf-bar"><div className="jf-fill" style={{width:`${pct}%`}} /></div>
          <span className="jf-pct">{checked}/{topics.length}</span>
        </div>
        <span className={`jf-chev${open?" open":""}`}>▾</span>
        {confirmDelete ? (
          <span style={{display:"flex",alignItems:"center",gap:4,marginLeft:4}} onClick={e=>e.stopPropagation()}>
            <span style={{fontSize:11,color:"#f87171"}}>Löschen?</span>
            <button className="btn-icon" style={{color:"#4ade80",fontSize:13}} onClick={e=>{e.stopPropagation();onDelete();}}>✓</button>
            <button className="btn-icon" style={{fontSize:13}} onClick={e=>{e.stopPropagation();setConfirmDelete(false);}}>✕</button>
          </span>
        ) : (
          <button className="btn-icon" style={{marginLeft:4}} title="BV entfernen"
            onClick={e=>{e.stopPropagation();setConfirmDelete(true);}}>×</button>
        )}
      </div>
      {open && (
        <div className="jf-body">
          {topics.map(t => (
            <div className="jf-row" key={t.id}>
              <input type="checkbox" checked={!!checks[t.id]} onChange={e => onToggle(t.id, e.target.checked)} />
              <div className="jf-row-info">
                <div className={`jf-row-label${checks[t.id]?" done":""}`}>{t.label}</div>
                <div className="jf-row-hint"><SrcTag src={t.src} />{t.hint}</div>
              </div>
            </div>
          ))}
          <div className="jf-footer">
            <button className="btn-ghost" onClick={onReset}>↺ Zurücksetzen</button>
            {pct === 100 && <span className="done-badge">✓ Abgehakt</span>}
          </div>
        </div>
      )}
    </div>
  );
}

function JourFixView({ jfState, setJfState, saveJF, activeBVs, setActiveBVs, planBVs, setPlanBVs, doneBVs, setDoneBVs, saveBVs }) {

  const dragIdx  = useRef(null);
  const dragOver = useRef(null);
  const [draggingId, setDraggingId] = useState(null);
  const [dragOverId, setDragOverId] = useState(null);
  const [collapsed, setCollapsed] = useState({ done: false, active: false, plan: false });
  const [addingKind, setAddingKind] = useState(null);
  const [newNum,  setNewNum]  = useState("");
  const [newName, setNewName] = useState("");

  const topicsFor = (kind) => kind==="active" ? JF_TOPICS_ACTIVE : kind==="plan" ? JF_TOPICS_PLAN : JF_TOPICS_DONE;
  const listFor   = (kind) => kind==="active" ? activeBVs : kind==="plan" ? planBVs : doneBVs;
  const setListFor= (kind, v) => { if(kind==="active") setActiveBVs(v); else if(kind==="plan") setPlanBVs(v); else setDoneBVs(v); };
  const saveAll   = (a,p,d) => saveBVs(a,p,d);

  const toggle = (kind, bvId, tid, val) => {
    const next = { ...jfState, [kind]: { ...jfState[kind], [bvId]: { ...(jfState[kind][bvId]||{}), [tid]: val } } };
    setJfState(next); saveJF(next);
  };
  const reset = (kind, bvId) => {
    const cleared = {}; topicsFor(kind).forEach(t => { cleared[t.id] = false; });
    const next = { ...jfState, [kind]: { ...jfState[kind], [bvId]: cleared } };
    setJfState(next); saveJF(next);
  };
  const deleteBV = (kind, bvId) => {
    const next = { ...jfState }; delete next[kind][bvId];
    setJfState(next); saveJF(next);
    const upd = listFor(kind).filter(b=>b.id!==bvId); setListFor(kind, upd);
    const a=kind==="active"?upd:activeBVs, p=kind==="plan"?upd:planBVs, d=kind==="done"?upd:doneBVs;
    saveAll(a,p,d);
  };

  /* ── Kategorie wechseln ── */
  const changeKind = (bvId, fromKind) => {
    const nextKind = KIND_CYCLE[(KIND_CYCLE.indexOf(fromKind)+1) % KIND_CYCLE.length];
    const bv = listFor(fromKind).find(b=>b.id===bvId);
    if (!bv) return;

    // Aus alter Liste entfernen, Checks löschen
    const oldList = listFor(fromKind).filter(b=>b.id!==bvId);
    setListFor(fromKind, oldList);
    const jfNext = { ...jfState };
    delete jfNext[fromKind][bvId];

    // In neue Liste einfügen, neue Checks anlegen
    const newChecks = {}; topicsFor(nextKind).forEach(t => { newChecks[t.id]=false; });
    jfNext[nextKind] = { ...jfNext[nextKind], [bvId]: newChecks };
    const newList = [...listFor(nextKind), bv];
    setListFor(nextKind, newList);

    setJfState(jfNext); saveJF(jfNext);
    const a = fromKind==="active"?oldList : nextKind==="active"?newList : activeBVs;
    const p = fromKind==="plan"  ?oldList : nextKind==="plan"  ?newList : planBVs;
    const d = fromKind==="done"  ?oldList : nextKind==="done"  ?newList : doneBVs;
    saveAll(a,p,d);
  };

  const addBV = (kind) => {
    if (!newName.trim()) return;
    const bv = { id: uid(), num: newNum.trim()||"–", name: newName.trim() };
    const checks = {}; topicsFor(kind).forEach(t => { checks[t.id]=false; });
    const nextJF = { ...jfState, [kind]: { ...jfState[kind], [bv.id]: checks } };
    setJfState(nextJF); saveJF(nextJF);
    const upd = [...listFor(kind), bv]; setListFor(kind, upd);
    const a=kind==="active"?upd:activeBVs, p=kind==="plan"?upd:planBVs, d=kind==="done"?upd:doneBVs;
    saveAll(a,p,d);
    setNewNum(""); setNewName(""); setAddingKind(null);
  };

  /* ── Drag (innerhalb einer Sektion) ── */
  const mkDrag = (kind) => ({
    start: (idx,id) => { dragIdx.current=idx; setDraggingId(id); },
    enter: (idx,id) => { dragOver.current=idx; setDragOverId(id); },
    end: () => {
      const from=dragIdx.current, to=dragOver.current;
      if (from!==null && to!==null && from!==to) {
        const next=[...listFor(kind)]; const [m]=next.splice(from,1); next.splice(to,0,m);
        setListFor(kind, next);
        const a=kind==="active"?next:activeBVs, p=kind==="plan"?next:planBVs, d=kind==="done"?next:doneBVs;
        saveAll(a,p,d);
      }
      dragIdx.current=null; dragOver.current=null; setDraggingId(null); setDragOverId(null);
    }
  });

  const totalAll = activeBVs.length*JF_TOPICS_ACTIVE.length + planBVs.length*JF_TOPICS_PLAN.length + doneBVs.length*JF_TOPICS_DONE.length;
  const totalChecked = ["active","plan","done"].reduce((s,k) =>
    s + listFor(k).reduce((s2,bv) => s2 + topicsFor(k).filter(t=>jfState[k]?.[bv.id]?.[t.id]).length, 0), 0);

  const renderSection = (kind) => {
    const list = listFor(kind);
    const topics = topicsFor(kind);
    const km = KIND_META[kind];
    const drag = mkDrag(kind);
    const doneCount = list.filter(bv => topics.every(t => jfState[kind]?.[bv.id]?.[t.id])).length;
    const isCollapsed = collapsed[kind];

    return (
      <div key={kind} style={{marginTop: kind==="done" ? 0 : 24}}>
        {/* Sektion-Header */}
        <div
          onClick={() => setCollapsed(c => ({...c, [kind]: !c[kind]}))}
          style={{display:"flex", alignItems:"center", gap:8, cursor:"pointer",
                  padding:"8px 12px", borderRadius:"var(--radius-lg)",
                  background:"var(--surface)", border:"1px solid var(--border)",
                  marginBottom: isCollapsed ? 0 : 10, userSelect:"none"}}>
          <span style={{fontSize:16, color:km.color, transition:"transform .2s",
                        display:"inline-block", transform: isCollapsed?"rotate(-90deg)":"rotate(0deg)"}}>▾</span>
          <span style={{fontSize:13, fontWeight:600, color:km.color, flex:1}}>{km.label}</span>
          <span style={{fontSize:11, color:"var(--muted)", fontFamily:"var(--mono)"}}>
            {list.length} BV
          </span>
        </div>

        {!isCollapsed && (
          <>
            {list.map((bv,i) => (
              <JFCard key={bv.id} bv={bv} topics={topics} kind={kind}
                checks={jfState[kind]?.[bv.id] || {}}
                onToggle={(tid,val) => toggle(kind, bv.id, tid, val)}
                onReset={() => reset(kind, bv.id)}
                onDelete={() => deleteBV(kind, bv.id)}
                onChangeKind={() => changeKind(bv.id, kind)}
                isDragging={draggingId===bv.id}
                isDragOver={dragOverId===bv.id && draggingId!==bv.id}
                onDragStart={() => drag.start(i, bv.id)}
                onDragEnter={() => drag.enter(i, bv.id)}
                onDragEnd={drag.end}
              />
            ))}
            {list.length===0 && (
              <div style={{padding:"14px 16px", fontSize:12, color:"var(--muted)",
                           background:"var(--surface)", border:"1px solid var(--border)",
                           borderRadius:"var(--radius-lg)", marginBottom:8}}>
                Keine BV in dieser Kategorie.
              </div>
            )}
            {addingKind===kind ? (
              <div className="add-bv-row">
                <input className="add-bv-inp" style={{maxWidth:80}} placeholder="Nr." value={newNum} onChange={e=>setNewNum(e.target.value)} />
                <input className="add-bv-inp" placeholder="BV Name…" value={newName}
                  onChange={e=>setNewName(e.target.value)}
                  onKeyDown={e=>{ if(e.key==="Enter") addBV(kind); if(e.key==="Escape"){ setAddingKind(null); setNewNum(""); setNewName(""); }}}
                  autoFocus />
                <button className="btn-primary" onClick={()=>addBV(kind)}>Hinzufügen</button>
                <button className="btn-cancel" onClick={()=>{ setAddingKind(null); setNewNum(""); setNewName(""); }}>Abbrechen</button>
              </div>
            ) : (
              <button style={{marginTop:4, background:"none", border:`1px solid ${km.color}44`,
                              color:km.color, fontFamily:"var(--font)", fontSize:12, fontWeight:600,
                              padding:"5px 14px", borderRadius:"var(--radius)", cursor:"pointer"}}
                onClick={()=>setAddingKind(kind)}>+ BV hinzufügen</button>
            )}
          </>
        )}
      </div>
    );
  };

  return (
    <div className="page">
      <div className="summary">
        <div className="sum-card"><div className="sum-val" style={{color:"#f87171"}}>{doneBVs.length}</div><div className="sum-label">Abgeschlossen</div></div>
        <div className="sum-card"><div className="sum-val" style={{color:"#4ade80"}}>{activeBVs.length}</div><div className="sum-label">Laufend</div></div>
        <div className="sum-card"><div className="sum-val" style={{color:"#f59e0b"}}>{planBVs.length}</div><div className="sum-label">Vorplanung</div></div>
        <div className="sum-card"><div className="sum-val">{doneBVs.length + activeBVs.length + planBVs.length}</div><div className="sum-label">BV gesamt</div></div>
      </div>
      {renderSection("done")}
      {renderSection("active")}
      {renderSection("plan")}
    </div>
  );
}

   COMPONENTS – Task Manager
══════════════════════════════════════════════════════════════ */
function TaskRow({ task, onPatch, onDelete, onCycleSt, onCycleAss, onAddSub, onPatchSub, onDelSub }) {
  const sm = STATUS_META[task.status] || STATUS_META.offen;
  const [newSub, setNewSub] = useState("");
  const [editing, setEditing] = useState(false);
  const [editVal, setEditVal] = useState(task.title);

  const commitEdit = () => {
    if (editVal.trim()) onPatch({ title: editVal.trim() });
    else setEditVal(task.title);
    setEditing(false);
  };

  return (
    <div className="tm-task">
      <div className="tm-task-row">
        <button className="status-pill" style={{color:sm.color,background:sm.bg,borderColor:sm.border}}
          onClick={() => onCycleSt(task.status)}>{sm.label}</button>
        {editing ? (
          <input
            className="add-task-inp"
            style={{flex:1, fontSize:13, padding:"3px 8px"}}
            value={editVal}
            onChange={e => setEditVal(e.target.value)}
            onKeyDown={e => { if(e.key==="Enter") commitEdit(); if(e.key==="Escape"){ setEditVal(task.title); setEditing(false); }}}
            onBlur={commitEdit}
            autoFocus
          />
        ) : (
          <span className={`task-title${task.status==="erledigt"?" done":""}`}
            onClick={() => onPatch({expanded:!task.expanded})}>{task.title}</span>
        )}
        <button className="btn-icon" title="Bearbeiten"
          onClick={() => { setEditVal(task.title); setEditing(e => !e); }}
          style={{fontSize:13, opacity: editing ? 1 : 0.6}}>✎</button>
        <button className="assignee-pill" onClick={() => onCycleAss(task.assignee)}>{task.assignee}</button>
        <button className="btn-icon" onClick={onDelete} title="Löschen">×</button>
      </div>
      {task.expanded && (
        <div className="tm-expand">
          <textarea className="note-inp" rows={2}
            placeholder="Notiz, z.B. Warte auf Angebot KW 23"
            value={task.note}
            onChange={e => onPatch({note:e.target.value})}
          />
          {task.subtasks.length > 0 && (
            <div className="subs">
              {task.subtasks.map(s => (
                <div className="sub-row" key={s.id}>
                  <input type="checkbox" checked={s.done} onChange={e => onPatchSub(s.id,{done:e.target.checked})} />
                  <span className={`sub-title${s.done?" done":""}`}>{s.title}</span>
                  <button className="btn-icon" style={{fontSize:12}} onClick={() => onDelSub(s.id)}>×</button>
                </div>
              ))}
            </div>
          )}
          <div className="sub-actions">
            <input className="add-task-inp" style={{fontSize:12,padding:"4px 8px"}} placeholder="Unterpunkt…"
              value={newSub} onChange={e => setNewSub(e.target.value)}
              onKeyDown={e => { if(e.key==="Enter"&&newSub.trim()){ onAddSub(newSub.trim()); setNewSub(""); }}}
            />
            <button className="btn-primary" style={{fontSize:11,padding:"4px 10px"}}
              onClick={() => { if(newSub.trim()){ onAddSub(newSub.trim()); setNewSub(""); }}}>+ Sub</button>
          </div>
        </div>
      )}
    </div>
  );
}

function ProjectCard({ project, filterAss, filterSt, onUpdate, onDelete, isDragging, isDragOver, dragHandleProps, onDragEnter, onDragEnd }) {
  const [addingTask, setAddingTask] = useState(false);
  const [newTitle, setNewTitle] = useState("");

  const patch = (tid, p) => onUpdate({ ...project, tasks: project.tasks.map(t => t.id===tid?{...t,...p}:t) });
  const cycleSt  = (tid, cur) => { const i=STATUS_CYCLE.indexOf(cur);   patch(tid,{status:STATUS_CYCLE[(i+1)%STATUS_CYCLE.length]}); };
  const cycleAss = (tid, cur) => { const i=ASSIGNEE_CYCLE.indexOf(cur); patch(tid,{assignee:ASSIGNEE_CYCLE[(i+1)%ASSIGNEE_CYCLE.length]}); };
  const delTask  = tid => onUpdate({ ...project, tasks: project.tasks.filter(t => t.id!==tid) });
  const addTask  = () => {
    if (!newTitle.trim()) return;
    onUpdate({ ...project, tasks:[...project.tasks, mkTask(newTitle.trim())] });
    setNewTitle(""); setAddingTask(false);
  };
  const addSub   = (tid, title) => patch(tid,{subtasks:[...(project.tasks.find(t=>t.id===tid)?.subtasks||[]),{id:uid(),title,done:false}]});
  const patchSub = (tid, sid, p) => patch(tid,{subtasks:project.tasks.find(t=>t.id===tid)?.subtasks.map(s=>s.id===sid?{...s,...p}:s)||[]});
  const delSub   = (tid, sid) => patch(tid,{subtasks:project.tasks.find(t=>t.id===tid)?.subtasks.filter(s=>s.id!==sid)||[]});

  const visible = project.tasks.filter(t =>
    (filterAss.length===0 || filterAss.includes("Alle") || filterAss.includes(t.assignee)) &&
    (filterSt.length===0  || filterSt.includes("Alle")  || filterSt.includes(t.status))
  );

  let cardClass = "tm-project";
  if (isDragging)  cardClass += " dragging";
  if (isDragOver)  cardClass += " drag-over";

  return (
    <div className={cardClass} onDragEnter={onDragEnter} onDragEnd={onDragEnd} onDragOver={e=>e.preventDefault()}>
      <div className="tm-proj-hd">
        <span className="drag-handle" title="Verschieben" {...dragHandleProps}>⠿</span>
        <span className="tm-proj-name">{project.name}</span>
        <span className="tm-proj-count">{project.tasks.length} Tasks</span>
        <button className="btn-icon" onClick={() => setAddingTask(a=>!a)} title="Task hinzufügen">+</button>
        <button className="btn-icon" onClick={onDelete} title="Projekt löschen">×</button>
      </div>
      {visible.map(task => (
        <TaskRow key={task.id} task={task}
          onPatch={p => patch(task.id,p)}
          onDelete={() => delTask(task.id)}
          onCycleSt={cur => cycleSt(task.id,cur)}
          onCycleAss={cur => cycleAss(task.id,cur)}
          onAddSub={title => addSub(task.id,title)}
          onPatchSub={(sid,p) => patchSub(task.id,sid,p)}
          onDelSub={sid => delSub(task.id,sid)}
        />
      ))}
      {visible.length===0 && project.tasks.length>0 && (
        <div style={{padding:"10px 16px",fontSize:12,color:"var(--muted)"}}>Keine Tasks für diesen Filter.</div>
      )}
      {addingTask && (
        <div className="add-task-row">
          <input className="add-task-inp" placeholder="Neue Aufgabe…" value={newTitle}
            onChange={e=>setNewTitle(e.target.value)}
            onKeyDown={e=>{ if(e.key==="Enter") addTask(); if(e.key==="Escape"){ setAddingTask(false); setNewTitle(""); }}}
            autoFocus
          />
          <button className="btn-primary" onClick={addTask}>Hinzufügen</button>
          <button className="btn-cancel" onClick={() => { setAddingTask(false); setNewTitle(""); }}>Abbrechen</button>
        </div>
      )}
    </div>
  );
}

function TaskManagerView({ projects, setProjects, saveProjects }) {
  const [filterAss, setFilterAss] = useState(["Alle"]);
  const [filterSt,  setFilterSt]  = useState(["Alle"]);
  const [addingBV,  setAddingBV]  = useState(false);
  const [newBVName, setNewBVName] = useState("");

  // Drag state
  const [orderedProjects, setOrderedProjects] = useState(projects);
  useEffect(() => { setOrderedProjects(projects); }, [projects]);

  const dragIdx     = useRef(null);
  const dragOverIdx = useRef(null);
  const touchTimer  = useRef(null);
  const touchDragging = useRef(false);
  const [draggingId, setDraggingId] = useState(null);
  const [dragOverId, setDragOverId] = useState(null);

  const update = p => { setProjects(p); setOrderedProjects(p); saveProjects(p); };

  const addProject = () => {
    if (!newBVName.trim()) return;
    update([...orderedProjects, {id:uid(), name:newBVName.trim(), tasks:[]}]);
    setNewBVName(""); setAddingBV(false);
  };

  /* ── Multi-select filter toggle ── */
  const toggleFilter = (arr, setArr, val) => {
    if (val === "Alle") { setArr(["Alle"]); return; }
    const without = arr.filter(x => x !== "Alle" && x !== val);
    const has = arr.includes(val);
    const next = has ? (without.length ? without : ["Alle"]) : [...without, val];
    setArr(next.length ? next : ["Alle"]);
  };

  /* ── Desktop Drag ── */
  const handleDragStart = (idx, id) => { dragIdx.current=idx; setDraggingId(id); };
  const handleDragEnter = (idx, id) => {
    if (dragIdx.current===null || idx===dragIdx.current) return;
    dragOverIdx.current = idx;
    setDragOverId(id);
    // Live reorder preview
    const next = [...orderedProjects];
    const [moved] = next.splice(dragIdx.current, 1);
    next.splice(idx, 0, moved);
    dragIdx.current = idx;
    setOrderedProjects(next);
  };
  const handleDragEnd = () => {
    if (orderedProjects !== projects) update(orderedProjects);
    dragIdx.current=null; dragOverIdx.current=null; setDraggingId(null); setDragOverId(null);
  };

  /* ── Touch Drag (long press) ── */
  const makeTouchHandlers = (idx, id) => ({
    onTouchStart: (e) => {
      touchTimer.current = setTimeout(() => {
        touchDragging.current = true;
        dragIdx.current = idx;
        setDraggingId(id);
        navigator.vibrate && navigator.vibrate(40);
      }, 400);
    },
    onTouchMove: (e) => {
      if (!touchDragging.current) { clearTimeout(touchTimer.current); return; }
      e.preventDefault();
      const touch = e.touches[0];
      const el = document.elementFromPoint(touch.clientX, touch.clientY);
      const card = el?.closest(".tm-project");
      if (!card) return;
      const allCards = [...document.querySelectorAll(".tm-project")];
      const toIdx = allCards.indexOf(card);
      if (toIdx !== -1 && toIdx !== dragIdx.current) {
        const next = [...orderedProjects];
        const [moved] = next.splice(dragIdx.current, 1);
        next.splice(toIdx, 0, moved);
        dragIdx.current = toIdx;
        setDragOverId(orderedProjects[toIdx]?.id);
        setOrderedProjects(next);
      }
    },
    onTouchEnd: () => {
      clearTimeout(touchTimer.current);
      if (touchDragging.current) { update(orderedProjects); }
      touchDragging.current = false;
      dragIdx.current=null; setDraggingId(null); setDragOverId(null);
    },
  });

  const openCount = orderedProjects.reduce((s,p) => s + p.tasks.filter(t=>t.status!=="erledigt").length, 0);
  const waitCount = orderedProjects.reduce((s,p) => s + p.tasks.filter(t=>t.status==="wartend").length, 0);
  const doneCount = orderedProjects.reduce((s,p) => s + p.tasks.filter(t=>t.status==="erledigt").length, 0);

  return (
    <div className="page" id="print-area">
      <div className="print-header">Aufgabenliste – BV-Manager</div>
      <div className="print-date">Erstellt: {new Date().toLocaleDateString("de-DE", {day:"2-digit",month:"2-digit",year:"numeric"})}</div>

      <div className="summary">
        <div className="sum-card"><div className="sum-val">{orderedProjects.length}</div><div className="sum-label">Projekte</div></div>
        <div className="sum-card"><div className="sum-val" style={{color:"#64748b"}}>{openCount}</div><div className="sum-label">Offen</div></div>
        <div className="sum-card"><div className="sum-val" style={{color:"#f59e0b"}}>{waitCount}</div><div className="sum-label">Wartend</div></div>
        <div className="sum-card"><div className="sum-val" style={{color:"#4ade80"}}>{doneCount}</div><div className="sum-label">Erledigt</div></div>
      </div>

      <div className="filters">
        <div className="filter-group">
          <span>Zuständig:</span>
          {["Alle","HP","DP","–"].map(a => (
            <button key={a}
              className={`f-btn${filterAss.includes(a)?" active":""}`}
              onClick={() => toggleFilter(filterAss, setFilterAss, a)}>{a}</button>
          ))}
        </div>
        <div className="filter-group">
          <span>Status:</span>
          {["Alle",...STATUS_CYCLE].map(s => (
            <button key={s}
              className={`f-btn${filterSt.includes(s)?" active":""}`}
              onClick={() => toggleFilter(filterSt, setFilterSt, s)}
              style={filterSt.includes(s)&&s!=="Alle"?{background:STATUS_META[s]?.color,borderColor:STATUS_META[s]?.color,color:"#0d1117"}:{}}>
              {s==="Alle"?"Alle":STATUS_META[s].label}
            </button>
          ))}
        </div>
      </div>

      {orderedProjects.length === 0 && <div className="empty">Noch keine Projekte. Füge das erste BV hinzu.</div>}

      {orderedProjects.map((p, idx) => (
        <ProjectCard key={p.id} project={p} filterAss={filterAss} filterSt={filterSt}
          isDragging={draggingId===p.id}
          isDragOver={dragOverId===p.id && draggingId!==p.id}
          dragHandleProps={{
            draggable: true,
            onDragStart: (e) => { e.stopPropagation(); handleDragStart(idx, p.id); },
            ...makeTouchHandlers(idx, p.id),
          }}
          onUpdate={updated => update(orderedProjects.map(x => x.id===p.id?updated:x))}
          onDelete={() => update(orderedProjects.filter(x => x.id!==p.id))}
          onDragEnter={() => handleDragEnter(idx, p.id)}
          onDragEnd={handleDragEnd}
        />
      ))}

      {addingBV ? (
        <div className="add-bv-row">
          <input className="add-bv-inp" placeholder="Name des neuen BV…" value={newBVName}
            onChange={e=>setNewBVName(e.target.value)}
            onKeyDown={e=>{ if(e.key==="Enter") addProject(); if(e.key==="Escape"){ setAddingBV(false); setNewBVName(""); }}}
            autoFocus
          />
          <button className="btn-primary" onClick={addProject}>Erstellen</button>
          <button className="btn-cancel" onClick={() => { setAddingBV(false); setNewBVName(""); }}>Abbrechen</button>
        </div>
      ) : (
        <button className="btn-primary" style={{marginTop:12}} onClick={() => setAddingBV(true)}>+ Neues BV</button>
      )}
    </div>
  );
}

/* ══════════════════════════════════════════════════════════════
   PDF EXPORT (top-level, kein React-State)
══════════════════════════════════════════════════════════════ */
function exportPDF(projects) {
  const btn = document.getElementById("pdf-btn");
  if (btn) { btn.textContent = "Erstelle..."; btn.disabled = true; }

  function doExport() {
    try {
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF({ orientation:"portrait", unit:"mm", format:"a4" });
      const pw = 180, ml = 15;
      const SL = { offen:"Offen", "in-arbeit":"In Arbeit", wartend:"Wartend", erledigt:"Erledigt" };
      const SC = { offen:[71,85,105], "in-arbeit":[146,64,14], wartend:[67,56,202], erledigt:[22,101,52] };
      const SB = { offen:[241,245,249], "in-arbeit":[254,249,236], wartend:[243,242,255], erledigt:[240,255,246] };
      const AC = { HP:[26,111,181], DP:[181,90,26] };
      const date = new Date().toLocaleDateString("de-DE",{day:"2-digit",month:"2-digit",year:"numeric"});
      const tot = projects.reduce((s,p)=>s+p.tasks.length,0);

      doc.setFillColor(15,23,42);
      doc.roundedRect(ml,12,pw,12,2,2,"F");
      doc.setFont("helvetica","bold"); doc.setFontSize(12); doc.setTextColor(255,255,255);
      doc.text("BV-Aufgabenliste", ml+4, 20);
      doc.setFont("helvetica","normal"); doc.setFontSize(8); doc.setTextColor(148,163,184);
      doc.text("Erstellt: "+date+"  |  "+projects.length+" Projekte  |  "+tot+" Aufgaben", ml+pw-4, 20, {align:"right"});

      let y = 28;
      const lh = 7;
      const np = (n) => { if (y+n > 282) { doc.addPage(); y=15; } };

      for (const p of projects) {
        np(14);
        doc.setFillColor(30,41,59); doc.rect(ml,y,pw,8,"F");
        doc.setFont("helvetica","bold"); doc.setFontSize(10); doc.setTextColor(255,255,255);
        doc.text(p.name, ml+3, y+5.5);
        doc.setFont("helvetica","normal"); doc.setFontSize(8); doc.setTextColor(148,163,184);
        doc.text(p.tasks.length+" Tasks", ml+pw-3, y+5.5, {align:"right"});
        y+=8;

        doc.setFillColor(248,250,252); doc.rect(ml,y,pw,6,"F");
        doc.setFont("helvetica","bold"); doc.setFontSize(7.5); doc.setTextColor(100,116,139);
        doc.text("Aufgabe", ml+3, y+4);
        doc.text("Status", ml+pw*0.72, y+4, {align:"center"});
        doc.text("Wer", ml+pw*0.92, y+4, {align:"center"});
        doc.setDrawColor(226,232,240); doc.setLineWidth(0.2);
        doc.line(ml,y+6,ml+pw,y+6);
        y+=6;

        for (let i=0; i<p.tasks.length; i++) {
          const t = p.tasks[i];
          const sl = SL[t.status]||t.status;
          const sbg = SB[t.status]||[241,245,249];
          const sfg = SC[t.status]||[71,85,105];
          const afg = AC[t.assignee]||[136,136,136];
          const done = t.status==="erledigt";
          const hn = !!(t.note&&t.note.trim());
          const hs = !!(t.subtasks&&t.subtasks.length>0);
          const rh = lh + (hn?4:0) + (hs?t.subtasks.length*4:0);
          np(rh+1);
          const rb = i%2===0?[248,250,252]:[255,255,255];
          doc.setFillColor(...rb);  doc.rect(ml,y,pw*0.62,rh,"F");
          doc.setFillColor(...sbg); doc.rect(ml+pw*0.62,y,pw*0.22,rh,"F");
          doc.setFillColor(...rb);  doc.rect(ml+pw*0.84,y,pw*0.16,rh,"F");
          doc.setFont("helvetica","normal"); doc.setFontSize(9);
          doc.setTextColor(...(done?[180,180,180]:[34,34,34]));
          doc.text(doc.splitTextToSize(t.title,pw*0.58)[0], ml+3, y+5);
          if (hn) {
            doc.setFont("helvetica","italic"); doc.setFontSize(7.5); doc.setTextColor(102,102,102);
            doc.text(doc.splitTextToSize(t.note,pw*0.58)[0], ml+3, y+9);
          }
          if (hs) {
            let sy=y+(hn?13:9);
            t.subtasks.forEach(s=>{
              doc.setFont("helvetica","normal"); doc.setFontSize(7.5); doc.setTextColor(s.done?180:100);
              doc.text((s.done?"v ":"- ")+s.title, ml+5, sy); sy+=4;
            });
          }
          doc.setFont("helvetica","bold"); doc.setFontSize(8); doc.setTextColor(...sfg);
          doc.text(sl, ml+pw*0.73, y+5, {align:"center"});
          doc.setFont("helvetica","bold"); doc.setFontSize(9); doc.setTextColor(...afg);
          doc.text(t.assignee, ml+pw*0.92, y+5, {align:"center"});
          doc.setDrawColor(226,232,240); doc.setLineWidth(0.15);
          doc.line(ml,y+rh,ml+pw,y+rh);
          y+=rh;
        }
        y+=5;
      }
      const pages=doc.getNumberOfPages();
      for(let i=1;i<=pages;i++){
        doc.setPage(i);
        doc.setFont("helvetica","normal"); doc.setFontSize(7); doc.setTextColor(150,150,150);
        doc.text("Seite "+i+" / "+pages, 195, 290, {align:"right"});
      }
      doc.save("BV-Aufgabenliste_"+date.replace(/\./g,"-")+".pdf");
    } catch(e) {
      alert("Fehler: "+e.message);
    } finally {
      if (btn) { btn.textContent = "PDF exportieren"; btn.disabled = false; }
    }
  }

  if (window.jspdf) {
    doExport();
  } else {
    const s = document.createElement("script");
    s.src = "https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js";
    s.onload = doExport;
    s.onerror = () => { alert("jsPDF konnte nicht geladen werden."); if(btn){btn.textContent="PDF exportieren";btn.disabled=false;} };
    document.head.appendChild(s);
  }
}

/* ══════════════════════════════════════════════════════════════
   ROOT APP
══════════════════════════════════════════════════════════════ */
function App() {
  const [tab, setTab]           = useState("jourfix");
  const [projects, setProjects] = useState([]);
  const [jfState, setJfState]   = useState({ active:{}, plan:{}, done:{} });
  const [activeBVs, setActiveBVs] = useState([]);
  const [planBVs,   setPlanBVs]   = useState([]);
  const [doneBVs,   setDoneBVs]   = useState([]);
  const [loaded, setLoaded]     = useState(false);

  useEffect(() => {
    const link = document.createElement("link");
    link.rel = "stylesheet";
    link.href = "https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&display=swap";
    document.head.appendChild(link);
    const el = document.createElement("style");
    el.textContent = CSS;
    document.head.appendChild(el);
    return () => { document.head.removeChild(el); document.head.removeChild(link); };
  }, []);

  useEffect(() => {
    (async () => {
      try {
        const t = await window.storage.get(SK_TASKS);
        setProjects(t?.value ? JSON.parse(t.value) : DEFAULT_TASKS);
      } catch { setProjects(DEFAULT_TASKS); }

      // BV-Listen laden
      let aList = ACTIVE_BVS.map(b => ({...b, id: b.num}));
      let pList = PLAN_BVS.map(b => ({...b, id: b.num}));
      let dList = DONE_BVS.map(b => ({...b, id: b.num}));
      try {
        const bvs = await window.storage.get(SK_JF_BVS);
        if (bvs?.value) { const p=JSON.parse(bvs.value); aList=p.active||aList; pList=p.plan||pList; dList=p.done||dList; }
      } catch {}
      setActiveBVs(aList);
      setPlanBVs(pList);
      setDoneBVs(dList);

      // JF-Checks laden
      try {
        const j = await window.storage.get(SK_JOURFIX);
        if (j?.value) setJfState(JSON.parse(j.value));
        else {
          const s = { active:{}, plan:{}, done:{} };
          aList.forEach(b => { s.active[b.id]={}; JF_TOPICS_ACTIVE.forEach(t=>{ s.active[b.id][t.id]=false; }); });
          pList.forEach(b => { s.plan[b.id]={};   JF_TOPICS_PLAN.forEach(t=>{   s.plan[b.id][t.id]=false;   }); });
          dList.forEach(b => { s.done[b.id]={};   JF_TOPICS_DONE.forEach(t=>{   s.done[b.id][t.id]=false;   }); });
          setJfState(s);
        }
      } catch {}

      setLoaded(true);
    })();
  }, []);

  const saveProjects = useCallback(data => {
    window.storage.set(SK_TASKS, JSON.stringify(data)).catch(()=>{});
  }, []);
  const saveJF = useCallback(data => {
    window.storage.set(SK_JOURFIX, JSON.stringify(data)).catch(()=>{});
  }, []);
  const saveBVs = useCallback((active, plan, done) => {
    window.storage.set(SK_JF_BVS, JSON.stringify({active, plan, done})).catch(()=>{});
  }, []);

  const projectsRef = useRef(projects);
  useEffect(() => { projectsRef.current = projects; }, [projects]);

  if (!loaded) return (
    <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",color:"#7d8590",fontFamily:"sans-serif"}}>
      Lade…
    </div>
  );

  return (
    <div>
      <nav className="nav">
        <button className={`nav-btn${tab==="jourfix"?" active":""}`} onClick={() => setTab("jourfix")}>
          ✓ Jour Fix
        </button>
        <button className={`nav-btn${tab==="tasks"?" active":""}`} onClick={() => setTab("tasks")}>
          ◈ Aufgaben
        </button>
        <div className="nav-spacer" />
        {tab === "tasks" && (
          <button id="pdf-btn" className="print-btn" onClick={() => exportPDF(projects)}>
            PDF exportieren
          </button>
        )}
      </nav>

      {tab === "jourfix" ? (
        <JourFixView
          jfState={jfState} setJfState={setJfState} saveJF={saveJF}
          activeBVs={activeBVs} setActiveBVs={setActiveBVs}
          planBVs={planBVs}     setPlanBVs={setPlanBVs}
          doneBVs={doneBVs}     setDoneBVs={setDoneBVs}
          saveBVs={saveBVs}
        />
      ) : (
        <TaskManagerView projects={projects} setProjects={setProjects} saveProjects={saveProjects} />
      )}
    </div>
  );
}

ReactDOM.createRoot || (ReactDOM.createRoot = (el) => ({ render: (c) => ReactDOM.render(c, el) }));
</script>

</body>
</html>
